<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups - Betelgeuse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bt-bg) 0%, var(--bt-surface) 50%, var(--bt-bg) 100%);
            color: var(--bt-fg);
            min-height: 100vh;
        }

        /* top bar (header + h1) is styled centrally in header.html */

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .section {
            background: linear-gradient(135deg, rgba(var(--bt-surface-rgb), 0.5) 0%, rgba(var(--bt-bg-rgb), 0.5) 100%);
            border: 1px solid rgba(var(--bt-slate-rgb), 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(var(--bt-slate-rgb), 0.1);
        }

        /* Blue-gradient title to match portfolio's .market-title (was white/1.4rem). */
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, var(--bt-accent-2) 0%, var(--bt-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .market-icon {
            font-size: 1.8rem;
            background: linear-gradient(135deg, rgba(var(--bt-accent2-rgb), 0.2) 0%, rgba(var(--bt-accent-rgb), 0.2) 100%);
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(var(--bt-accent2-rgb), 0.2);
            /* Reset so the parent .section-title gradient-text doesn't hollow the emoji. */
            -webkit-text-fill-color: initial;
        }

        .group-list {
            list-style: none;
        }

        /* Slim, grid-like rows — sized to sit close to the Overview grid (--grid-font 0.78rem). */
        .group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.45rem 0.8rem;
            background: rgba(var(--bt-bg-rgb), 0.4);
            border: 1px solid rgba(var(--bt-slate-rgb), 0.1);
            border-radius: 8px;
            margin-bottom: 0.35rem;
            font-size: 0.82rem;
            transition: all 0.3s ease;
        }

        .group-item:hover {
            background: rgba(var(--bt-accent-rgb), 0.05);
            border-color: rgba(var(--bt-accent2-rgb), 0.2);
        }

        .group-name {
            font-weight: 500;
        }

        .group-item.default {
            border-left: 3px solid var(--bt-accent);
        }

        .group-item.dragging {
            opacity: 0.4;
        }

        .group-item.drag-over {
            border-color: rgba(var(--bt-accent2-rgb), 0.6);
            box-shadow: inset 0 3px 0 -1px var(--bt-accent);
        }

        .drag-handle {
            cursor: grab;
            color: var(--bt-fg-subtle);
            font-size: 0.95rem;
            line-height: 1;
            padding-right: 0.5rem;
            user-select: none;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .group-item.dragging .drag-handle {
            cursor: grabbing;
        }

        /* Compact in-row control — sits inside the slim group row, so smaller than .btn. */
        .btn-delete {
            background: rgba(var(--bt-down2-rgb), 0.1);
            color: var(--bt-down);
            border: 1px solid rgba(var(--bt-down-rgb), 0.3);
            padding: 0.25rem 0.65rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.72rem;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: rgba(var(--bt-down2-rgb), 0.2);
            border-color: rgba(var(--bt-down-rgb), 0.5);
        }

        .btn-delete:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .add-group-form {
            display: flex;
            align-items: center;   /* keep the Add button at its natural .btn height (no flex-stretch) */
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(var(--bt-slate-rgb), 0.1);
        }

        .add-group-form input {
            flex: 1;
            padding: 0.625rem 0.875rem;
            border: 1px solid rgba(var(--bt-slate-rgb), 0.2);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            line-height: 1.2;
            background-color: rgba(var(--bt-bg-rgb), 0.6);
            color: var(--bt-fg);
        }

        /* Buttons use the shared .btn / .btn-primary / .btn-success classes from
           header.html (single source of truth). No per-page button sizing here. */

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--bt-fg-subtle);
        }

        .save-success {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: linear-gradient(135deg, var(--bt-green) 0%, var(--bt-green-deep) 100%);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transform: translateY(150%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .save-success.show {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.4rem;
            }

            .container {
                padding: 1rem;
            }

            .section {
                padding: 1.5rem;
            }

            .section-header {
                flex-direction: column;
                gap: 1rem;
            }

            .add-group-form {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    {% include 'header.html' %}

    <div class="container">
        <div class="section">
            <div class="section-header">
                <span class="section-title">
                    <span class="market-icon">🇭🇰</span>
                    Hong Kong
                </span>
                <div class="add-group-form">
                    <input type="text" id="hk-group-input" placeholder="New group name...">
                    <button class="btn btn-primary" onclick="addGroup('hk')">Add</button>
                </div>
            </div>
            <ul class="group-list" id="hk-groups"></ul>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-title">
                    <span class="market-icon">🇯🇵</span>
                    Japan
                </span>
                <div class="add-group-form">
                    <input type="text" id="jp-group-input" placeholder="New group name...">
                    <button class="btn btn-primary" onclick="addGroup('jp')">Add</button>
                </div>
            </div>
            <ul class="group-list" id="jp-groups"></ul>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-title">
                    <span class="market-icon">🇺🇸</span>
                    United States
                </span>
                <div class="add-group-form">
                    <input type="text" id="us-group-input" placeholder="New group name...">
                    <button class="btn btn-primary" onclick="addGroup('us')">Add</button>
                </div>
            </div>
            <ul class="group-list" id="us-groups"></ul>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-title">
                    <span class="market-icon">🟠</span>
                    Cryptocurrency
                </span>
                <div class="add-group-form">
                    <input type="text" id="crypto-group-input" placeholder="New group name...">
                    <button class="btn btn-primary" onclick="addGroup('crypto')">Add</button>
                </div>
            </div>
            <ul class="group-list" id="crypto-groups"></ul>
        </div>

        <button class="btn btn-success" onclick="saveAllGroups()">💾 Save All Changes</button>
    </div>

    <div class="save-success" id="save-success">
        ✓ Groups saved successfully!
    </div>

    <script>
        let groups = {
            'hk': [],
            'jp': [],
            'us': [],
            'crypto': []
        };
        let portfolio = {};

        async function loadData() {
            try {
                const groupsResponse = await fetch('/betelgeuse/api/groups/hk');
                groups.hk = await groupsResponse.json();
                const jpResponse = await fetch('/betelgeuse/api/groups/jp');
                groups.jp = await jpResponse.json();
                const usResponse = await fetch('/betelgeuse/api/groups/us');
                groups.us = await usResponse.json();
                const cryptoResponse = await fetch('/betelgeuse/api/groups/crypto');
                groups.crypto = await cryptoResponse.json();

                const portfolioResponse = await fetch('/betelgeuse/api/portfolio');
                portfolio = await portfolioResponse.json();

                renderGroups('hk');
                renderGroups('jp');
                renderGroups('us');
                renderGroups('crypto');
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function renderGroups(market) {
            const containerId = `${market}-groups`;
            const container = document.getElementById(containerId);
            const marketPortfolio = portfolio[market] || [];

            if (groups[market].length === 0) {
                container.innerHTML = '<li class="empty-state">No groups yet</li>';
                return;
            }

            const html = groups[market].map(group => {
                const stocksInGroup = marketPortfolio.filter(s => (s.group || 'Default') === group);
                const count = stocksInGroup.length;
                const isDefault = group === 'Default';

                // Construct instrument rows
                let stocksHtml = '';
                if (count > 0) {
                    stocksHtml = `<div class="stocks-list" id="stocks-${market}-${group.replace(/\s+/g, '-')}" style="display: none; padding: 0.5rem; background: rgba(13,17,23, 0.6); margin-top: 0.5rem; border-radius: 4px;">
                        ${stocksInGroup.map(s => `<div style="padding: 0.25rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem;">
                            <span style="color: #58a6ff; font-family: monospace;">${s.symbol}</span> - ${s.name}
                        </div>`).join('')}
                    </div>`;
                }

                return `
                    <li class="group-item ${isDefault ? 'default' : ''}" draggable="true" data-market="${market}" data-group="${group}" style="flex-direction: column; align-items: stretch;">
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; cursor: pointer;" onclick="toggleGroup('${market}', '${group.replace(/\s+/g, '-')}')">
                            <span style="display: flex; align-items: center;">
                                <span class="drag-handle" title="Drag to reorder">⠿</span>
                                <span class="group-name">${group} (${count})</span>
                            </span>
                            ${!isDefault ? `<button class="btn-delete" onclick="event.stopPropagation(); deleteGroup('${market}', '${group}')">Delete</button>` : ''}
                        </div>
                        ${stocksHtml}
                    </li>
                `;
            }).join('');

            container.innerHTML = html;
        }

        function toggleGroup(market, groupId) {
            const el = document.getElementById(`stocks-${market}-${groupId}`);
            if (el) {
                el.style.display = (el.style.display === 'none') ? 'block' : 'none';
            }
        }

        async function addGroup(market) {
            const input = document.getElementById(`${market}-group-input`);
            const group = input.value.trim();

            if (!group) {
                alert('Please enter a group name');
                return;
            }

            if (groups[market].includes(group)) {
                alert('Group already exists');
                return;
            }

            groups[market].push(group);
            input.value = '';
            renderGroups(market);

            try {
                const response = await fetch(`/betelgeuse/api/groups/${market}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ groups: groups[market] })
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Save failed');
                }
                const successEl = document.getElementById('save-success');
                successEl.classList.add('show');
                setTimeout(() => successEl.classList.remove('show'), 2000);
            } catch (error) {
                console.error('Error saving group:', error);
                alert('Error saving group: ' + error.message);
                groups[market] = groups[market].filter(g => g !== group);
                renderGroups(market);
            }
        }

        async function deleteGroup(market, groupName) {
            const stocksInGroup = (portfolio[market] || []).filter(s => (s.group || 'Default') === groupName);

            if (stocksInGroup.length > 0) {
                alert(`"${groupName}" cannot be removed — it still contains ${stocksInGroup.length} active instrument${stocksInGroup.length > 1 ? 's' : ''}. Please reassign or remove all instruments from this group before deleting it.`);
                return;
            }

            if (!confirm(`Are you sure you want to delete the "${groupName}" group? This action cannot be undone.`)) return;

            try {
                const response = await fetch(`/betelgeuse/api/groups/${market}/${groupName}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    groups[market] = groups[market].filter(g => g !== groupName);
                    renderGroups(market);
                } else {
                    const error = await response.json();
                    alert('Error: ' + error.error);
                }
            } catch (error) {
                console.error('Error deleting group:', error);
                alert('Error deleting group');
            }
        }


        async function saveAllGroups() {
            try {
                const markets = ['hk', 'jp', 'us', 'crypto'];
                const promises = markets.map(async (market) => {
                    await fetch(`/betelgeuse/api/groups/${market}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ groups: groups[market] })
                    });
                });

                await Promise.all(promises);

                document.getElementById('save-success').classList.add('show');
                setTimeout(() => {
                    document.getElementById('save-success').classList.remove('show');
                }, 2000);
            } catch (error) {
                console.error('Error saving groups:', error);
                alert('Error saving groups');
            }
        }

        let dragState = { market: null, group: null };

        function reorderGroup(market, draggedGroup, targetGroup, insertAfter) {
            const arr = groups[market];
            const from = arr.indexOf(draggedGroup);
            if (from === -1) return;
            arr.splice(from, 1);
            let to = arr.indexOf(targetGroup);
            if (to === -1) {
                arr.push(draggedGroup);
            } else {
                if (insertAfter) to += 1;
                arr.splice(to, 0, draggedGroup);
            }
            renderGroups(market);
        }

        function clearDragOver(container) {
            container.querySelectorAll('.group-item.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        async function persistOrder(market, snapshot) {
            try {
                const response = await fetch(`/betelgeuse/api/groups/${market}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ groups: groups[market] })
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Save failed');
                }
                const successEl = document.getElementById('save-success');
                successEl.classList.add('show');
                setTimeout(() => successEl.classList.remove('show'), 2000);
            } catch (error) {
                console.error('Error saving order:', error);
                alert('Error saving new order: ' + error.message);
                groups[market] = snapshot;
                renderGroups(market);
            }
        }

        function setupDragAndDrop() {
            ['hk', 'jp', 'us', 'crypto'].forEach(market => {
                const container = document.getElementById(`${market}-groups`);

                container.addEventListener('dragstart', (e) => {
                    const item = e.target.closest('.group-item');
                    if (!item) return;
                    dragState.market = item.dataset.market;
                    dragState.group = item.dataset.group;
                    e.dataTransfer.effectAllowed = 'move';
                    item.classList.add('dragging');
                });

                container.addEventListener('dragover', (e) => {
                    if (dragState.market !== market) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    const targetItem = e.target.closest('.group-item');
                    clearDragOver(container);
                    if (targetItem) targetItem.classList.add('drag-over');
                });

                container.addEventListener('drop', (e) => {
                    if (dragState.market !== market) return;
                    e.preventDefault();
                    clearDragOver(container);
                    const snapshot = [...groups[market]];
                    const draggedGroup = dragState.group;
                    const targetItem = e.target.closest('.group-item');
                    if (!targetItem) {
                        reorderGroup(market, draggedGroup, null, false);
                    } else {
                        const targetGroup = targetItem.dataset.group;
                        const rect = targetItem.getBoundingClientRect();
                        const insertAfter = (e.clientY - rect.top) > rect.height / 2;
                        reorderGroup(market, draggedGroup, targetGroup, insertAfter);
                    }
                    persistOrder(market, snapshot);
                });

                container.addEventListener('dragend', (e) => {
                    const item = e.target.closest('.group-item');
                    if (item) item.classList.remove('dragging');
                    clearDragOver(container);
                    dragState.market = null;
                    dragState.group = null;
                });
            });
        }

        // Handle Enter key in inputs
        ['hk', 'jp', 'us', 'crypto'].forEach(market => {
            document.getElementById(`${market}-group-input`).addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addGroup(market);
                }
            });
        });

        setupDragAndDrop();
        loadData();
    </script>
</body>
</html>
