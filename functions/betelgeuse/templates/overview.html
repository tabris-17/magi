                        labels += `<text x="${(cx + lr * Math.cos(mid)).toFixed(1)}" y="${(cy + lr * Math.sin(mid)).toFixed(1)}" class="pie-lab" text-anchor="middle" dominant-baseline="middle">${(frac * 100).toFixed(0)}%</text>`;
                    }
                    ang = end;
                });
            }
            const legend = data.map(d => {
                const pct = d.weight != null ? d.weight : (d.value / total * 100);
                return `<div class="pleg-row">
                    <span class="pleg-sw" style="background:${d.color}"></span>
                    <span class="pleg-lab" title="${esc(d.label)}">${esc(d.label)}</span>
                    <span class="pleg-val">${esc(fmtMoney(d.value, base, { dp: 0, bare: true }))}</span>
                    <span class="pleg-pct">${pct.toFixed(1)}%</span>
                </div>`;
            }).join('');
            return `<div class="pchart-wrap">
                <svg viewBox="0 0 170 170" class="pchart-svg">${slices}${labels}</svg>
                <div class="pleg">${legend}</div>
            </div>`;
        }

        // Diverging P&L bar: gains green to the right, losses red to the left, length ∝ |pnl|.
        // Sorted gain→loss. Each bar labelled with the signed amount (base, no symbol) over the
        // gain/loss % (return on cost — NOT the allocation weight).
        function renderDivergingBar(data, base) {
            const items = data.filter(d => d.pnl != null).slice().sort((a, b) => b.pnl - a.pnl);
            if (!items.length) return '<div class="pchart-empty">No P&amp;L yet.</div>';
            const maxAbs = Math.max(...items.map(d => Math.abs(d.pnl)), 1);
            const rows = items.map(d => {
                const pos = d.pnl >= 0;
                const barPct = (Math.abs(d.pnl) / maxAbs * 50).toFixed(2);   // up to the full half-track
                const amt = fmtMoney(d.pnl, base, { signed: true, dp: 0, bare: true });
                const gainPct = d.pnl_pct != null ? ` (${d.pnl_pct > 0 ? '+' : ''}${d.pnl_pct.toFixed(0)}%)` : '';
                // amount + gain/loss % live in their own grid column (right), so they never collide with the axis label
                return `<div class="dbar-row">
                    <span class="dbar-label" title="${esc(d.label)}">${esc(d.label)}</span>
                    <div class="dbar-track">
                        <span class="dbar-mid"></span>
                        <span class="dbar-fill ${pos ? 'pos' : 'neg'}" style="width:${barPct}%"></span>
                    </div>
                    <span class="dbar-amt ${pos ? 'pos' : 'neg'}">${esc(amt)}${gainPct ? `<span class="dbar-amt-pct">${esc(gainPct)}</span>` : ''}</span>
                </div>`;
            }).join('');
            return `<div class="dbar-wrap">${rows}</div>`;
        }

        // Render the toggle + both charts for the current granularity.
        function renderPnlCharts() {
            const host = document.getElementById('pnlCharts');
            if (!host) return;
            if (!state.pnl || !state.pnl.markets || !Object.keys(state.pnl.markets).length) {
                host.innerHTML = '';
                return;
            }
            const base = state.pnl.base, mode = state.pnlChartMode;
            const data = pnlChartData(mode);
            host.innerHTML = `
                <div class="pnl-charts-head">
                    <div class="pnl-chart-toggle">
                        <button class="pct-btn ${mode === 'instrument' ? 'active' : ''}" data-mode="instrument">By Instrument</button>
                        <button class="pct-btn ${mode === 'market' ? 'active' : ''}" data-mode="market">By Market</button>
                    </div>
                </div>
                <div class="pnl-charts-grid">
                    <div class="pnl-chart-card">
                        <div class="pnl-chart-title">Allocation by value <span class="pnl-chart-ccy">(${esc(base)})</span></div>
                        ${renderPieChart(data, base)}
                    </div>
                    <div class="pnl-chart-card">
                        <div class="pnl-chart-title">Unrealized P&amp;L <span class="pnl-chart-ccy">(${esc(base)})</span></div>
                        ${renderDivergingBar(data, base)}
                    </div>
                </div>`;
            host.querySelectorAll('.pct-btn').forEach(b => b.addEventListener('click', () => {
                state.pnlChartMode = b.dataset.mode;
                try { sessionStorage.setItem('pnlChartMode', b.dataset.mode); } catch (e) {}
                renderPnlCharts();   // both charts re-render together
            }));
        }

        // Render the whole My Portfolio tab (charts + market-grouped holdings).
        function renderPortfolioTab() {
            renderPnlCharts();
            renderPnlSections();
        }

        // ── Tabs ──
        function setTab(name) {
            state.activeTab = name;
            try { sessionStorage.setItem('ovTab', name); } catch (e) {}
            document.querySelectorAll('.ov-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
            const wl = document.getElementById('tab-watchlist'), pf = document.getElementById('tab-portfolio');
            if (wl) wl.hidden = name !== 'watchlist';
            if (pf) pf.hidden = name !== 'portfolio';
            if (name === 'portfolio') renderPortfolioTab();
        }
        document.querySelectorAll('.ov-tab').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));
        (function initTab() {
            let saved = null, savedMode = null;
            try { saved = sessionStorage.getItem('ovTab'); savedMode = sessionStorage.getItem('pnlChartMode'); } catch (e) {}
            if (savedMode === 'instrument' || savedMode === 'market') state.pnlChartMode = savedMode;
            setTab(saved === 'portfolio' ? 'portfolio' : 'watchlist');
        })();

        // ── Toolbar wiring ──
        document.getElementById('searchInput').addEventListener('input', (e) => {
            state.search = e.target.value.trim();
            render();
        });

        load();
    </script>
</body>
</html>
